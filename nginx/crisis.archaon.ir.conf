server {
    listen 443 ssl;
    server_name crisis.archaon.ir;
    client_max_body_size 10M;

    # SSL
    ssl_certificate /etc/letsencrypt/live/crisis.archaon.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crisis.archaon.ir/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ACME challenge for cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy to FastAPI app
    location / {
        proxy_pass http://192.168.2.248:8080;
        proxy_pass_header Server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto "https";

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for LLM responses (can be slow on free tier)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Cache static assets
    location /static/ {
        proxy_pass http://192.168.2.248:8080/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto "https";
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # PWA service worker — must NOT be cached
    location = /sw.js {
        proxy_pass http://192.168.2.248:8080/sw.js;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # PWA manifest
    location = /manifest.json {
        proxy_pass http://192.168.2.248:8080/manifest.json;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto "https";
        add_header Cache-Control "no-cache";
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name crisis.archaon.ir;
    return 301 https://$host$request_uri;
}
