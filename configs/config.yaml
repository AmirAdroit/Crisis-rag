# ---- Crisis Survival RAG: central configuration ----

llm:
  # OpenAI-compatible endpoint. Values here are the LOCAL default; override per
  # environment with env vars (so real API keys are never committed):
  #   LLM_BASE_URL, LLM_API_KEY, LLM_MODEL
  # Local (Ollama, default):  base_url http://localhost:11434/v1  api_key EMPTY  model aya-expanse:8b
  # Aggregator (e.g. Avalai): LLM_BASE_URL=https://api.avalai.ir/v1 LLM_API_KEY=sk-... LLM_MODEL=gpt-4o
  # OpenRouter:               LLM_BASE_URL=https://openrouter.ai/api/v1 LLM_API_KEY=sk-or-... LLM_MODEL=openai/gpt-4o
  model_name: "qwen2.5:7b-instruct"
  base_url: "http://localhost:11434/v1"
  api_key: "EMPTY"                  # client requires a value; Ollama ignores it
  temperature: 0.1                  # low = factual, deterministic for safety content
  max_tokens: 1024

embedding:
  # Multilingual, strong on Persian, small enough for CPU. ~560MB.
  model_name: "intfloat/multilingual-e5-base"
  device: "cpu"                     # set "cuda" if you have spare VRAM
  query_prefix: "query: "           # e5 models REQUIRE these prefixes
  passage_prefix: "passage: "

reranker:
  enabled: true
  model_name: "BAAI/bge-reranker-v2-m3"   # multilingual, handles Persian
  top_n: 4                                  # docs passed to LLM after rerank

vector_store:
  provider: "qdrant"
  url: "http://localhost:6333"
  collection: "crisis_survival_fa"
  distance: "Cosine"

retrieval:
  top_k: 12                # candidates fetched before reranking
  score_threshold: 0.0     # e5 cosine; keep low, let reranker filter

chunking:
  chunk_size: 500          # characters; Persian text is dense, keep moderate
  chunk_overlap: 80

domain:
  # Out-of-domain guard. Primary gate is the reranker score (well calibrated for
  # on- vs off-topic); raise min_rerank_score if it answers off-topic, lower if it
  # over-refuses. min_relevance_for_answer is only the fallback when reranker is off.
  min_rerank_score: 0.02
  min_relevance_for_answer: 0.35
